---
format_version: '25'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: android
pipelines:
  run_ui_tests:
    workflows:
      build_androidTest_apk: {}
      build_debug_apk: {}
      run_instrumentation_tests:
        depends_on:
        - build_androidTest_apk
        - build_debug_apk
        parallel: "$TEST_SHARD_COUNT"
workflows:
  build_androidTest_apk:
    summary: Build instrumentation test APKs for all modules and write an index file.
    steps:
    - git-clone@8: {}
    - install-missing-android-tools@3:
        inputs:
        - gradlew_path: "$PROJECT_LOCATION/gradlew"
    - restore-gradle-cache@3: {}
    - gradle-runner@5:
        title: Assemble Android Test APKs
        inputs:
        - gradlew_path: "./gradlew"
        - gradle_task: assembleAndroidTest
    - script@1:
        title: Collect test APKs and split into two batches
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -euo pipefail
            LIMIT=$((2 * 1024 * 1024 * 1024))
            BATCH_0="$BITRISE_SOURCE_DIR/test_intermediates_0"
            BATCH_1="$BITRISE_SOURCE_DIR/test_intermediates_1"
            mkdir -p "$BATCH_0" "$BATCH_1"

            # Collect APKs with sizes, sort largest-first (FFD bin packing)
            mapfile -t entries < <(
              find . -name "*-androidTest.apk" -exec stat -c "%s %n" {} \; | sort -rn
            )

            TEST_APK_COUNT=${#entries[@]}

            # Write name-sorted index used by instrumentation shards
            for entry in "${entries[@]}"; do
              basename "${entry#* }"
            done | LC_ALL=C sort > "$BATCH_0/test_apks.txt"

            bin0_size=0
            bin1_size=0

            for entry in "${entries[@]}"; do
              size="${entry%% *}"
              path="${entry#* }"
              if (( bin0_size + size <= LIMIT )); then
                cp "$path" "$BATCH_0/"
                (( bin0_size += size ))
              else
                cp "$path" "$BATCH_1/"
                (( bin1_size += size ))
              fi
            done

            if (( bin1_size == 0 )); then
              touch "$BATCH_1/.keep"
            fi

            TEST_SHARD_COUNT=$(( (TEST_APK_COUNT + 1) / 2 ))
            envman add --key TEST_APK_COUNT --value "$TEST_APK_COUNT"
            envman add --key TEST_SHARD_COUNT --value "$TEST_SHARD_COUNT"
            envman add --key TEST_INTERMEDIATES_DIR_0 --value "$BATCH_0"
            envman add --key TEST_INTERMEDIATES_DIR_1 --value "$BATCH_1"

            echo "Test APKs indexed ($TEST_APK_COUNT):"
            cat "$BATCH_0/test_apks.txt"
            echo "Batch 0: $(( bin0_size / 1024 / 1024 )) MB ($(ls "$BATCH_0"/*.apk 2>/dev/null | wc -l | tr -d ' ') APKs)"
            echo "Batch 1: $(( bin1_size / 1024 / 1024 )) MB ($(ls "$BATCH_1"/*.apk 2>/dev/null | wc -l | tr -d ' ') APKs)"

            find "$BITRISE_DEPLOY_DIR" -name "*-androidTest.apk" -delete
    - share-pipeline-variable@1:
        inputs:
        - variables: TEST_SHARD_COUNT=$TEST_SHARD_COUNT
    - save-gradle-cache@1: {}
    - deploy-to-bitrise-io@2:
        inputs:
        - pipeline_intermediate_files: |-
            TEST_INTERMEDIATES_DIR_0
            TEST_INTERMEDIATES_DIR_1
    meta:
      bitrise.io:
        machine_type_id: g2.linux.4large
  build_debug_apk:
    summary: Build the debug APK.
    steps:
    - git-clone@8: {}
    - install-missing-android-tools@3:
        inputs:
        - gradlew_path: "$PROJECT_LOCATION/gradlew"
    - restore-gradle-cache@3: {}
    - android-build@1:
        inputs:
        - project_location: "$PROJECT_LOCATION"
        - module: app
        - variant: debug
        - cache_level: none
    - save-gradle-cache@1: {}
    - deploy-to-bitrise-io@2:
        inputs:
        - pipeline_intermediate_files: "$BITRISE_APK_PATH:DEBUG_APK"
    meta:
      bitrise.io:
        machine_type_id: g2.linux.4large
  run_instrumentation_tests:
    summary: Run instrumentation tests for one module on a Bitrise Android emulator.
    steps:
    - pull-intermediate-files@1:
        inputs:
        - artifact_sources: build_androidTest_apk,build_debug_apk
    - script@1:
        title: Merge batches and select test APKs by parallel index
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -euo pipefail
            TEST_INTERMEDIATES_DIR="$BITRISE_SOURCE_DIR/test_intermediates_merged"
            mkdir -p "$TEST_INTERMEDIATES_DIR"

            cp -r "$TEST_INTERMEDIATES_DIR_0/." "$TEST_INTERMEDIATES_DIR/"
            find "$TEST_INTERMEDIATES_DIR_1" -name "*.apk" \
              -exec cp {} "$TEST_INTERMEDIATES_DIR/" \;

            LINE_A=$(( BITRISE_IO_PARALLEL_INDEX * 2 + 1 ))
            LINE_B=$(( BITRISE_IO_PARALLEL_INDEX * 2 + 2 ))

            TEST_APK_A=$(sed -n "${LINE_A}p" "$TEST_INTERMEDIATES_DIR/test_apks.txt")
            TEST_APK_B=$(sed -n "${LINE_B}p" "$TEST_INTERMEDIATES_DIR/test_apks.txt")

            if [[ -z "$TEST_APK_A" ]]; then
              echo "No APK found for shard $BITRISE_IO_PARALLEL_INDEX"
              exit 1
            fi

            echo "Shard $BITRISE_IO_PARALLEL_INDEX: $TEST_APK_A${TEST_APK_B:+ and $TEST_APK_B}"
            envman add --key TEST_INTERMEDIATES_DIR --value "$TEST_INTERMEDIATES_DIR"
            envman add --key TEST_APK_A --value "$TEST_APK_A"
            envman add --key TEST_APK_B --value "$TEST_APK_B"
    - avd-manager@2:
        inputs:
        - api_level: "33"
        - abi: x86_64
    - wait-for-android-emulator@1: {}
    - script@1:
        title: Install APKs and run instrumentation tests
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -euo pipefail

            APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" | sort -V | tail -1)
            AAPT2=$(find "$ANDROID_HOME/build-tools" -name "aapt2" | sort -V | tail -1)
            KEYSTORE="$HOME/.android/debug.keystore"
            mkdir -p "$HOME/.android"
            if [ ! -f "$KEYSTORE" ]; then
              keytool -genkeypair -v -keystore "$KEYSTORE" \
                -storepass android -alias androiddebugkey -keypass android \
                -keyalg RSA -keysize 2048 -validity 10000 \
                -dname "CN=Android Debug,O=Android,C=US"
            fi

            sign() {
              "$APKSIGNER" sign --ks "$KEYSTORE" --ks-pass pass:android \
                --ks-key-alias androiddebugkey --key-pass pass:android \
                --out "$2" "$1"
            }

            sign "$DEBUG_APK" /tmp/debug_resigned.apk
            adb install -r -t /tmp/debug_resigned.apk

            # Write the Python result parser once
            cat > /tmp/parse_results.py << 'PYEOF'
            import os, re, sys
            output = open(os.environ['AM_OUTPUT']).read()
            result_dir = os.environ['RESULT_DIR']
            module = os.environ['MODULE']
            cases, cur, in_stack = [], {}, False
            for line in output.splitlines():
                if line.startswith('INSTRUMENTATION_STATUS: class='):
                    cur['class'] = line.split('=', 1)[1].strip(); in_stack = False
                elif line.startswith('INSTRUMENTATION_STATUS: test='):
                    cur['test'] = line.split('=', 1)[1].strip(); in_stack = False
                elif line.startswith('INSTRUMENTATION_STATUS: stack='):
                    cur['stack'] = [line.split('=', 1)[1].strip()]; in_stack = True
                elif in_stack and not line.startswith('INSTRUMENTATION_STATUS'):
                    cur['stack'].append(line)
                elif line.startswith('INSTRUMENTATION_STATUS:'):
                    in_stack = False
                elif re.match(r'INSTRUMENTATION_STATUS_CODE: ', line):
                    code = int(line.split(': ', 1)[1])
                    if code in (0, -1, -2, -3):
                        cases.append(dict(cur, code=code)); cur = {}
                    in_stack = False
            failures = sum(1 for c in cases if c['code'] in (-1, -2))
            skipped = sum(1 for c in cases if c['code'] == -3)
            xml = ['<?xml version="1.0" encoding="UTF-8"?>',
                   f'<testsuite name="{module}" tests="{len(cases)}" failures="{failures}" skipped="{skipped}">']
            for c in cases:
                xml.append(f'  <testcase classname="{c.get("class","")}" name="{c.get("test","")}">')
                if c['code'] in (-1, -2):
                    xml.append(f'    <failure><![CDATA[{chr(10).join(c.get("stack",[]))}]]></failure>')
                elif c['code'] == -3:
                    xml.append('    <skipped/>')
                xml.append('  </testcase>')
            xml.append('</testsuite>')
            os.makedirs(result_dir, exist_ok=True)
            with open(f'{result_dir}/test-info.json', 'w') as f:
                f.write(f'{{"test-name":"{module}"}}\n')
            open(f'{result_dir}/TEST-results.xml', 'w').write('\n'.join(xml))
            print(f'{module}: {len(cases)} tests, {failures} failures, {skipped} skipped')
            sys.exit(1 if failures > 0 else 0)
            PYEOF

            run_module() {
              local apk_name="$1"
              local module="${apk_name%-debug-androidTest.apk}"
              local test_apk="$TEST_INTERMEDIATES_DIR/$apk_name"

              echo "--- $module ---"
              sign "$test_apk" "/tmp/${module}_resigned.apk"
              adb install -r -t "/tmp/${module}_resigned.apk"

              local am_output="/tmp/am_output_${module}.txt"
              "$AAPT2" dump packagename "$test_apk" \
                | xargs -I{} adb shell am instrument -w -r \
                    {}/androidx.test.runner.AndroidJUnitRunner \
                > "$am_output" 2>&1 || true

              if [ ! -s "$am_output" ]; then
                echo "ERROR: am instrument produced no output for $module" >&2
                return 1
              fi
              cat "$am_output"

              MODULE="$module" \
              RESULT_DIR="$BITRISE_TEST_RESULT_DIR/$module" \
              AM_OUTPUT="$am_output" \
                python3 /tmp/parse_results.py
            }

            mkdir -p "$BITRISE_TEST_RESULT_DIR"
            overall_exit=0
            for apk in "$TEST_APK_A" ${TEST_APK_B:+"$TEST_APK_B"}; do
              run_module "$apk" || overall_exit=1
            done
            exit $overall_exit
    - deploy-to-bitrise-io@2: {}
    meta:
      bitrise.io:
        machine_type_id: g2.linux.4large
  run_unit_tests:
    summary: Run your Android unit tests and get the test report.
    description: The workflow will first clone your Git repository, cache your
      Gradle dependencies, install Android tools, run your Android unit tests
      and save the test report.
    steps:
    - activate-ssh-key@4: {}
    - git-clone@8: {}
    - install-missing-android-tools@3:
        inputs:
        - gradlew_path: "$PROJECT_LOCATION/gradlew"
    - gradle-runner@5:
        inputs:
        - gradlew_path: "./gradlew"
        - gradle_task: test
    - script@1:
        inputs:
        - content: "#!/usr/bin/env bash


            \            set -euo pipefail



            \            : \"${BITRISE_TEST_RESULT_DIR:?must be set by the
            Bitrise CLI for

            \            this step}\"


            \            : \"${BITRISE_SOURCE_DIR:=$(pwd)}\"


            \            cd \"$BITRISE_SOURCE_DIR\"



            \            #

            \            ------------------------------------------------------\
            -------------\\

            \            --


            \            # Directory contract (from
            steps-deploy-to-bitrise-io/test/test.go):


            \            #


            \            #   $BITRISE_TEST_DEPLOY_DIR/        <- root
            deploy-to-bitrise scans


            \            #     <step_results_dir>/            <-
            $BITRISE_TEST_RESULT_DIR


            \            #       step-info.json               <- written by
            Bitrise CLI


            \            #       <test_run_dir>/              <- one per \"test
            run\" we want

            \            shown


            \            #         test-info.json             <- we write this


            \            #         *.xml                      <- JUnit XMLs
            (merged by

            \            converter)


            \            #


            \            # Grouping: ONE test_run_dir per module. All variants
            (debug,

            \            release,


            \            # any flavors) for that module are funneled into the
            same dir, so

            \            the


            \            # JUnit converter merges every <testsuite> into a
            single TestReport


            \            # shown as one entry on the Tests tab.


            \            #


            \            # Filename collisions: Gradle emits the same TEST-*.xml
            filenames


            \            # across variants (debug + release both produce
            TEST-Foo.xml), and

            \            the


            \            # parser only globs one level deep — so subdirectories
            per variant


            \            # wouldn't be read. We prefix each XML with its variant
            name on

            \            copy.


            \            #


            \            # Walk scope: find . starts at $BITRISE_SOURCE_DIR.
            Narrow the start


            \            # path or -path filter to speed up large monorepos.


            \            #

            \            ------------------------------------------------------\
            -------------\\

            \            --



            \            mapfile -t result_dirs < <(


            \            \\    find . -type d -path \"*/build/test-results/*\"
            \\\\


            \            \\    -not -path \"*/node_modules/*\" \\\\


            \            \\    | while read -r d; do


            \            \\        if compgen -G \"$d/*.xml\" > /dev/null; then
            echo \"$d\";

            \            fi


            \            \\        done


            \            )



            \            if [ ${#result_dirs[@]} -eq 0 ]; then


            \            \\    echo \"No JUnit XMLs found under any
            */build/test-results/*\"


            \            \\    exit 0


            \            fi



            \            echo \"Found ${#result_dirs[@]} module test-result
            directories:\"


            \            printf '  %s\\n' \"${result_dirs[@]}\"



            \            for dir in \"${result_dirs[@]}\"; do


            \            \\    # dir example:

            \            ./features/login/build/test-results/testDebugUnitTest


            \            \\    module_path=\"${dir#./}\"


            \            \\    module_path=\"${module_path%%/build/test-results\
            /*}\"   # e.g.

            \            features/login


            \            \\    test_task=\"${dir##*/test-results/}\"                        \
            # e.g.

            \            testDebugUnitTest


            \            \\   \\\ 


            \            \\    # Group key = module only (drop the task —
            variants merge

            \            together).


            \            \\    safe_name=\"$(echo \"${module_path}\" | tr '/'
            '-' | tr ' '

            \            '_')\"


            \            \\    display_name=\":${module_path//\\\\//:}\"


            \            \\   \\\ 


            \            \\    dest=\"$BITRISE_TEST_RESULT_DIR/$safe_name\"


            \            \\    mkdir -p \"$dest\"


            \            \\   \\\ 


            \            \\    # Write test-info.json once per module
            (idempotent — same

            \            content


            \            \\    # whether this is the first or fifth variant for
            the module).


            \            \\    printf '{\"test-name\":\"%s\"}\\n'
            \"$display_name\" >

            \            \"$dest/test-info.json\"


            \            \\   \\\ 


            \            \\    # Prefix each XML with the variant to avoid
            filename collisions


            \            \\    # across debug/release/flavors. Each becomes a
            distinct file

            \            the


            \            \\    # converter parses, then merges into the module's
            single

            \            TestReport.


            \            \\    for xml in \"$dir\"/*.xml; do


            \            \\    base=\"$(basename \"$xml\")\"


            \            \\    cp \"$xml\" \"$dest/${test_task}-${base}\"


            \            \\    done


            \            \\   \\\ 


            \            \\    echo \"  -> Merged $module_path/$test_task into

            \            '$display_name'\"


            \            done



            \            echo


            \            echo \"Module groups written:\"


            \            for d in \"$BITRISE_TEST_RESULT_DIR\"/*/; do


            \            \\    [ -d \"$d\" ] || continue


            \            \\    name=\"$(basename \"$d\")\"


            \            \\    count=$(find \"$d\" -maxdepth 1 -name '*.xml' |
            wc -l | tr -d '

            \            ')


            \            \\    echo \"  - $name ($count XML files)\"


            \            done"
        title: Export Test Results
    - deploy-to-bitrise-io@2: {}
    meta:
      bitrise.io:
        machine_type_id: g2.linux.4large
  appium_ui_testing:
    summary: Run Appium UI tests against the Android app.
    description: Clones the repository, builds a debug APK, starts the Appium
      server, runs Appium UI tests, and uploads results to Bitrise.
    steps:
    - git-clone@8: {}
    - install-missing-android-tools@3:
        inputs:
        - gradlew_path: "$PROJECT_LOCATION/gradlew"
    - restore-gradle-cache@3: {}
    - android-build@1:
        inputs:
        - project_location: "$PROJECT_LOCATION"
        - module: "$MODULE"
        - variant: "$VARIANT"
        - cache_level: none
    - appium-server@0.0.6:
        inputs:
        - appium_version: next
    - gradle-runner@5:
        inputs:
        - gradle_task: ":e2e:test"
        title: Run Appium Tests
    - save-gradle-cache@1: {}
    - deploy-to-bitrise-io@2: {}
  build_apk:
    summary: Run your Android unit tests and create an APK file to install your app
      on a device or share it with your team.
    description: The workflow will first clone your Git repository, install Android
      tools, set the project's version code based on the build number, run
      Android lint and unit tests, build the project's APK file and save it.
    steps:
    - activate-ssh-key@4: {}
    - git-clone@8: {}
    - install-missing-android-tools@3:
        inputs:
        - gradlew_path: "$PROJECT_LOCATION/gradlew"
    - change-android-versioncode-and-versionname@1:
        inputs:
        - build_gradle_path: "$PROJECT_LOCATION/$MODULE/build.gradle"
    - activate-build-cache-for-gradle@2: {}
    - restore-gradle-cache@3: {}
    - android-build@1:
        inputs:
        - project_location: "$PROJECT_LOCATION"
        - module: "$MODULE"
        - variant: "$VARIANT"
        - cache_level: none
        - arguments: -Dorg.gradle.jvmargs="-Xmx16g -XX:+HeapDumpOnOutOfMemoryError"
            --warning-mode=none
    - save-gradle-cache@1: {}
    - deploy-to-bitrise-io@2: {}
    meta:
      bitrise.io:
        machine_type_id: g2.linux.4large
meta:
  bitrise.io:
    stack: linux-docker-android-22.04
    machine_type_id: standard
app:
  envs:
  - PROJECT_LOCATION: "."
    opts:
      is_expand: false
  - MODULE: app
    opts:
      is_expand: false
  - VARIANT: debug
    opts:
      is_expand: false
